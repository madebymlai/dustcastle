name: Publish to npm

# Publish-on-version-change: whenever package.json lands on main with a version
# that isn't already on the npm registry, build + publish it, then tag the commit
# and cut a GitHub release for that version. Bumping the version is the only
# trigger you need — no manual tagging.
on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch: {}

permissions:
  contents: write # create the git tag + GitHub release
  id-token: write # npm provenance (requires a public repo)

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already published
        id: check
        run: |
          if npm view "dustcastle@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version ${{ steps.pkg.outputs.version }} already on npm — nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        if: steps.check.outputs.publish == 'true'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.check.outputs.publish == 'true'
        run: npm ci

      # No NODE_AUTH_TOKEN: auth is short-lived OIDC via the id-token permission,
      # authorized by the package's Trusted Publisher config on npmjs.com. npm
      # generates provenance automatically. `prepack` (npm run build) runs as
      # part of `npm publish`.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public

      # Tag + release are made idempotent: a tag that already exists on the
      # remote (e.g. pushed manually before the bump landed) must not abort the
      # job, because npm publish has already happened by this point. Skip the
      # push when the tag is already on origin, and only cut the release when one
      # doesn't exist yet for this tag.
      - name: Tag and create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin — skipping tag push."
          else
            git tag "$tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
