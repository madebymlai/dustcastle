version = 1
revision = 1
requires-python = ">=3.11"

# A minimal, real-shape uv.lock (laimk-hse.6). Both deps ship pure-Python WHEELS
# (a [[package.wheels]] entry, no sdist-only block), so the slice-4 uv.lock impurity
# reader keeps this PURE: it routes the pip-FOD pure/offline path, never the
# container. `uv export --format requirements-txt` materialises the hash-pinned
# requirements.txt from this lock; the pip-FOD then builds it exactly like pip.

[[package]]
name = "sample"
version = "0.0.0"
source = { virtual = "." }
dependencies = [
    { name = "idna" },
    { name = "urllib3" },
]

[[package]]
name = "idna"
version = "3.17"
source = { registry = "https://pypi.org/simple" }
sdist = { url = "https://files.pythonhosted.org/packages/idna-3.17.tar.gz", hash = "sha256:466e48829084efe2548012b855df21540b96f2e20e51bd124c851536556a592c" }
wheels = [
    { url = "https://files.pythonhosted.org/packages/idna-3.17-py3-none-any.whl", hash = "sha256:5eb0cb53bc467c12eadcf6de83163ad8527cec9416f44b9b61b19caedad2b87f" },
]

[[package]]
name = "urllib3"
version = "2.7.0"
source = { registry = "https://pypi.org/simple" }
sdist = { url = "https://files.pythonhosted.org/packages/urllib3-2.7.0.tar.gz", hash = "sha256:231e0ec3b63ceb14667c67be60f2f2c40a518cb38b03af60abc813da26505f4c" }
wheels = [
    { url = "https://files.pythonhosted.org/packages/urllib3-2.7.0-py3-none-any.whl", hash = "sha256:9fb4c81ebbb1ce9531cce37674bbc6f1360472bc18ca9a553ede278ef7276897" },
]
